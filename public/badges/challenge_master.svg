<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFEC80"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2A2814"/>
      <stop offset="60%" stop-color="#1A1A0A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEC80"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3B0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <circle cx="100" cy="95" r="86" fill="none" stroke="url(#ring)" stroke-width="5" filter="url(#shadow)"/>
  <circle cx="100" cy="95" r="79" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="95" r="78" fill="url(#bg)"/>

  <!-- Laurel wreath decorative -->
  <g fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.2">
    <path d="M30 60 Q35 45 45 40 Q50 42 48 50 Q55 38 65 35"/>
    <path d="M170 60 Q165 45 155 40 Q150 42 152 50 Q145 38 135 35"/>
  </g>

  <g fill="url(#ring)" opacity="0.3">
    <circle cx="100" cy="19" r="2"/><circle cx="140" cy="23" r="2"/>
    <circle cx="171" cy="50" r="2"/><circle cx="177" cy="95" r="2"/>
    <circle cx="171" cy="140" r="2"/><circle cx="140" cy="167" r="2"/>
    <circle cx="100" cy="171" r="2"/><circle cx="60" cy="167" r="2"/>
    <circle cx="29" cy="140" r="2"/><circle cx="23" cy="95" r="2"/>
    <circle cx="29" cy="50" r="2"/><circle cx="60" cy="23" r="2"/>
  </g>

  <!-- Trophy icon -->
  <g filter="url(#glow)">
    <!-- Trophy cup -->
    <path d="M78 58 L72 50 Q68 42 72 38 L76 42 L80 50 L82 58Z" fill="url(#crownGrad)" opacity="0.7"/>
    <path d="M122 58 L128 50 Q132 42 128 38 L124 42 L120 50 L118 58Z" fill="url(#crownGrad)" opacity="0.7"/>
    <!-- Cup body -->
    <path d="M78 58 Q75 60 74 68 Q72 80 78 90 Q85 100 100 104 Q115 100 122 90 Q128 80 126 68 Q125 60 122 58Z" fill="url(#crownGrad)" opacity="0.85"/>
    <!-- Cup inner -->
    <path d="M82 62 Q80 68 82 82 Q88 94 100 98 Q112 94 118 82 Q120 68 118 62Z" fill="none" stroke="#FFF3B0" stroke-width="1" opacity="0.3"/>
    <!-- Cup base -->
    <rect x="78" y="100" width="44" height="6" rx="2" fill="url(#crownGrad)" opacity="0.8"/>
    <rect x="84" y="104" width="32" height="4" rx="1" fill="url(#crownGrad)" opacity="0.6"/>
    <!-- Star shine -->
    <polygon points="97,70 99,76 105,76 100,80 102,86 97,82 92,86 94,80 89,76 95,76" fill="#FFF3B0" opacity="0.4"/>
  </g>

  <!-- Small stars -->
  <g fill="url(#ring)" opacity="0.15">
    <polygon points="100,32 103,40 111,40 104,45 107,53 100,48 93,53 96,45 89,40 97,40"/>
    <polygon points="155,78 157,83 162,83 158,87 160,92 155,89 150,92 152,87 148,83 153,83"/>
    <polygon points="45,78 47,83 52,83 48,87 50,92 45,89 40,92 42,87 38,83 43,83"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M64 175 L100 190 L136 175 L136 210 L100 198 L64 210Z" fill="url(#ribbon)"/>
    <path d="M64 175 L100 190 L136 175" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.3"/>
    <text x="100" y="192" text-anchor="middle" fill="#1A1A0A" font-family="Georgia,serif" font-size="8" font-weight="bold" letter-spacing="1">CHAMPION</text>
  </g>
</svg>