<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="30%" stop-color="#E8A870"/>
      <stop offset="60%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2A1F14"/>
      <stop offset="60%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="50%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A870"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4F8A"/>
      <stop offset="100%" stop-color="#3A2A5A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <circle cx="100" cy="95" r="86" fill="none" stroke="url(#ring)" stroke-width="5" filter="url(#shadow)"/>
  <circle cx="100" cy="95" r="79" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="95" r="78" fill="url(#bg)"/>

  <g fill="url(#ring)" opacity="0.3">
    <circle cx="100" cy="19" r="2"/><circle cx="140" cy="23" r="2"/>
    <circle cx="171" cy="50" r="2"/><circle cx="177" cy="95" r="2"/>
    <circle cx="171" cy="140" r="2"/><circle cx="140" cy="167" r="2"/>
    <circle cx="100" cy="171" r="2"/><circle cx="60" cy="167" r="2"/>
    <circle cx="29" cy="140" r="2"/><circle cx="23" cy="95" r="2"/>
    <circle cx="29" cy="50" r="2"/><circle cx="60" cy="23" r="2"/>
  </g>

  <!-- Camera icon -->
  <g filter="url(#glow)">
    <!-- Camera body -->
    <rect x="55" y="75" width="90" height="50" rx="10" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <rect x="55" y="75" width="90" height="50" rx="10" fill="url(#iconGrad)" opacity="0.08"/>
    <!-- Flash -->
    <rect x="120" y="78" width="12" height="6" rx="2" fill="url(#iconGrad)" opacity="0.6"/>
    <!-- Top bump -->
    <path d="M78 75 L82 65 L118 65 L122 75" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Lens outer -->
    <circle cx="92" cy="100" r="16" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
    <circle cx="92" cy="100" r="12" fill="url(#lensGrad)" opacity="0.5"/>
    <circle cx="92" cy="100" r="8" fill="none" stroke="url(#iconGrad)" stroke-width="1" opacity="0.5"/>
    <!-- Lens reflection -->
    <path d="M84 94 Q88 90 94 92" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <!-- Focus rings -->
    <circle cx="92" cy="100" r="14" fill="none" stroke="url(#iconGrad)" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,3"/>
  </g>

  <g fill="url(#ring)" opacity="0.15">
    <polygon points="100,32 103,40 111,40 104,45 107,53 100,48 93,53 96,45 89,40 97,40"/>
    <polygon points="155,78 157,83 162,83 158,87 160,92 155,89 150,92 152,87 148,83 153,83"/>
    <polygon points="45,78 47,83 52,83 48,87 50,92 45,89 40,92 42,87 38,83 43,83"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M64 175 L100 190 L136 175 L136 210 L100 198 L64 210Z" fill="url(#ribbon)"/>
    <path d="M64 175 L100 190 L136 175" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.3"/>
    <text x="100" y="192" text-anchor="middle" fill="#FFF" font-family="Georgia,serif" font-size="9" font-weight="bold" letter-spacing="1">ŒIL DE LYNX</text>
  </g>
</svg>