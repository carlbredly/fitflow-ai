<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="30%" stop-color="#B9F2FF"/>
      <stop offset="60%" stop-color="#7BE0FF"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#14283A"/>
      <stop offset="60%" stop-color="#0A1A2A"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#B9F2FF"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B9F2FF"/>
      <stop offset="100%" stop-color="#7BE0FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <circle cx="100" cy="95" r="86" fill="none" stroke="url(#ring)" stroke-width="5" filter="url(#shadow)"/>
  <circle cx="100" cy="95" r="79" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="95" r="78" fill="url(#bg)"/>

  <!-- Decorative snowflake/star pattern -->
  <g stroke="url(#ring)" stroke-width="0.8" opacity="0.15">
    <line x1="100" y1="22" x2="100" y2="40"/>
    <line x1="100" y1="150" x2="100" y2="168"/>
    <line x1="30" y1="95" x2="50" y2="95"/>
    <line x1="150" y1="95" x2="170" y2="95"/>
    <line x1="50" y1="45" x2="63" y2="58"/>
    <line x1="137" y1="132" x2="150" y2="145"/>
    <line x1="50" y1="145" x2="63" y2="132"/>
    <line x1="137" y1="58" x2="150" y2="45"/>
  </g>

  <g fill="url(#ring)" opacity="0.3">
    <circle cx="100" cy="19" r="2"/><circle cx="140" cy="23" r="2"/>
    <circle cx="171" cy="50" r="2"/><circle cx="177" cy="95" r="2"/>
    <circle cx="171" cy="140" r="2"/><circle cx="140" cy="167" r="2"/>
    <circle cx="100" cy="171" r="2"/><circle cx="60" cy="167" r="2"/>
    <circle cx="29" cy="140" r="2"/><circle cx="23" cy="95" r="2"/>
    <circle cx="29" cy="50" r="2"/><circle cx="60" cy="23" r="2"/>
  </g>

  <!-- Diamond icon -->
  <g filter="url(#glow)">
    <path d="M100 50 L130 85 L100 130 L70 85Z" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <path d="M100 50 L130 85 L100 130 L70 85Z" fill="url(#iconGrad)" opacity="0.15"/>
    <path d="M100 50 L100 130" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
    <path d="M70 85 L130 85" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
    <path d="M85 68 L100 85 L115 68" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.7"/>
    <path d="M85 102 L100 85 L115 102" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.7"/>
    <!-- Inner sparkle -->
    <circle cx="100" cy="85" r="3" fill="#FFFFFF" opacity="0.8"/>
    <path d="M100 79 L100 91 M94 85 L106 85" stroke="#FFF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <g fill="url(#ring)" opacity="0.15">
    <polygon points="100,32 103,40 111,40 104,45 107,53 100,48 93,53 96,45 89,40 97,40"/>
    <polygon points="155,78 157,83 162,83 158,87 160,92 155,89 150,92 152,87 148,83 153,83"/>
    <polygon points="45,78 47,83 52,83 48,87 50,92 45,89 40,92 42,87 38,83 43,83"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M64 175 L100 190 L136 175 L136 210 L100 198 L64 210Z" fill="url(#ribbon)"/>
    <path d="M64 175 L100 190 L136 175" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.3"/>
    <text x="100" y="192" text-anchor="middle" fill="#0A1A2A" font-family="Georgia,serif" font-size="8" font-weight="bold" letter-spacing="1">INARRÊTABLE</text>
  </g>
</svg>